name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /var/www/maqaam
            rm -f .git/index.lock
            rm -rf frontend-user/.next frontend-admin/.next
            rm -rf backend/node_modules frontend-user/node_modules frontend-admin/node_modules
            npm cache clean --force || true
            rm -rf ~/.npm/_cacache || true
            pm2 flush || true
            rm -rf ~/.pm2/logs/* || true
            sudo journalctl --vacuum-size=30M || true
            sudo apt-get clean || true
            df -h /
            export NODE_OPTIONS="--max-old-space-size=768"
            bash deploy/deploy.sh
