# Maqaam production nginx — domain: maqaam.me
# Upstreams: backend :5000, user :3000, admin :3001 (PM2)

upstream maqaam_api {
    server 127.0.0.1:5000;
    keepalive 8;
}

upstream maqaam_user {
    server 127.0.0.1:3000;
    keepalive 8;
}

upstream maqaam_admin {
    server 127.0.0.1:3001;
    keepalive 8;
}

# API
server {
    listen 80;
    server_name api.maqaam.me;
    client_max_body_size 3m;

    location / {
        proxy_pass http://maqaam_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# User site (canonical: maqaam.me)
server {
    listen 80;
    server_name maqaam.me;
    client_max_body_size 3m;

    location / {
        proxy_pass http://maqaam_user;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Redirect www → apex (keeps CORS/cookies on one user origin)
server {
    listen 80;
    server_name www.maqaam.me;
    return 301 $scheme://maqaam.me$request_uri;
}

# Admin
server {
    listen 80;
    server_name admin.maqaam.me;
    client_max_body_size 3m;

    location / {
        proxy_pass http://maqaam_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
